<!DOCTYPE html>
<html>
<head>
<title>Student Details</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Student Details</h2>

<div id="studentData">Loading...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB1fDsZXzhSMNQIKQm30-wzHwWL8VYl2nc",
  authDomain: "all-in-one-4a582.firebaseapp.com",
  projectId: "all-in-one-4a582",
  storageBucket: "all-in-one-4a582.firebasestorage.app",
  messagingSenderId: "454652251769",
  appId: "1:454652251769:web:892e670d2fbc527b3c0ea8",
  measurementId: "G-WHQXG0PB9F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Read ID from URL
const params = new URLSearchParams(window.location.search);
const studentId = params.get("id");

if(studentId){

db.collection("students").doc(studentId).get()
.then((doc)=>{

if(doc.exists){

const data = doc.data();

document.getElementById("studentData").innerHTML = `
<h3>Name: ${data.name}</h3>
<p>Phone: ${data.phone}</p>
<p>Location: ${data.loaction}</p>
`;

}
else{

document.getElementById("studentData").innerHTML = "Student not found";

}

});

}

</script>

</body>
</html>
